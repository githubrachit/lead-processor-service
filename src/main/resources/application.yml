server:
  port: 8081

spring:
  application:
    name: lead-processor-service
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: false

  cloud:
    aws:
      region:
        static: ${AWS_REGION:ap-south-1}

# App config
app:
  sqs:
    lead-processing-queue: ${SQS_LEAD_PROCESSING_QUEUE:lead-processing-queue}
    audit-queue: ${SQS_AUDIT_QUEUE:audit-queue}

# Logging
logging:
  level:
    com.leadplatform: INFO
    io.awspring.cloud: INFO
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
